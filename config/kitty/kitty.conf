font_family JetBrainsMono Nerd Font Mono
font_size 13.5
shell /usr/bin/fish
wayland_enable_ime yes
window_padding_width 5
hide_window_decorations yes
background_opacity 0.8
remember_window_size no
confirm_os_window_close 0
enable_audio_bell no

foreground              #e6e1e9
background              #141218
selection_foreground    #33275e
selection_background    #cbbeff
cursor                  #cbbeff
cursor_text_color       #33275e
url_color               #eeb8cb

active_border_color     #cbbeff
inactive_border_color   #48454e
bell_border_color       #ffb4ab

active_tab_foreground   #33275e
active_tab_background   #cbbeff
active_tab_font_style   bold
inactive_tab_foreground #cac4cf
inactive_tab_background #2b2930
inactive_tab_font_style normal
tab_bar_background      none
tab_bar_margin_color    none
tab_bar_style           powerline
tab_powerline_style     round
tab_bar_edge            bottom
tab_bar_min_tabs        1
tab_title_template      " {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''} "

color0  #2b2930
color1  #ffb4ab
color2  #cac3dc
color3  #eeb8cb
color4  #cbbeff
color5  #eeb8cb
color6  #bae0ff
color7  #e6e1e9
color8  #938f99
color9  #ffb4ab
color10 #cbbeff
color11 #ffd8e4
color12 #cbbeff
color13 #f5bde6
color14 #bae0ff
color15 #ffffff

cursor_trail 1
cursor_shape block
shell_integration no-cursor
